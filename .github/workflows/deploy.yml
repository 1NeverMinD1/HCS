name: Deploy Fullstack (Strapi + Frontend)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          timeout: 30m
          command_timeout: 30m

          script: |
            set -e

            cd /var/www/project
            git pull

            # Backend
            cd strapi_hcs
            npm install
            npm run build
            pm2 reload strapi

            # Frontend
            cd ../frontend
            npm install
            npm run build
